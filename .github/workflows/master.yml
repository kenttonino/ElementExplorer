name: workflow-master

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Build
      run: make build
    - name: Build Test
      run: make build-test
    - name: Run Input Test
      run: make run-test bin="input_test"
    - name: Run Element Test
      run: make run-test bin="element_test"
